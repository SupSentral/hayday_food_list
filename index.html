<html lang="id">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

    /* ===================================================
       LIGHT, MODERN & ELEGANT CSS (Optimized Performance)
       =================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: #fcf8f2;
      color: #4a3728;
      padding: 25px 15px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1400px;
      margin: auto;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header h1 {
      font-size: 38px;
      font-weight: 700;
      color: #e06c00;
    }

    .header p {
      margin-top: 5px;
      font-size: 15px;
      color: #8a7360;
    }

    /* Facebook Profile Badge */
    .fb-profile {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 6px 14px;
      background-color: #ffffff;
      border: 1px solid #ebdccb;
      border-radius: 20px;
      text-decoration: none;
      color: #1877f2;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .fb-profile:hover {
      background-color: #f0f7ff;
      border-color: #1877f2;
    }

    .fb-profile svg {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Controls Panel */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 25px;
    }

    .search-box {
      flex: 1;
      min-width: 260px;
    }

    .search-box input {
      width: 100%;
      padding: 12px 18px;
      border: 1.5px solid #ebdccb;
      border-radius: 12px;
      background: #ffffff;
      color: #4a3728;
      font-size: 15px;
      outline: none;
    }

    .search-box input:focus {
      border-color: #e06c00;
    }

    .filter-select {
      padding: 0 16px;
      height: 48px;
      border: 1.5px solid #ebdccb;
      border-radius: 12px;
      background: #ffffff;
      color: #4a3728;
      font-size: 15px;
      font-weight: 500;
      outline: none;
      cursor: pointer;
    }

    .filter-select:focus {
      border-color: #e06c00;
    }

    /* Stats Grid */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat-card {
      background: #ffffff;
      padding: 16px;
      border-radius: 16px;
      text-align: center;
      border: 1px solid #ebdccb;
    }

    .stat-card h2 {
      font-size: 28px;
      color: #e06c00;
      font-weight: 700;
    }

    .stat-card p {
      font-size: 13px;
      color: #8a7360;
      margin-top: 2px;
    }

    /* Selected Box (📋 List Pilihan) */
    .selected-box {
      background: #ffffff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      border: 1.5px solid #ebdccb;
    }

    .selected-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .selected-title {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .selected-title h2 {
      color: #e06c00;
      font-size: 22px;
    }

    #toggleIcon {
      font-size: 14px;
    }

    .selected-content {
      overflow: hidden;
      max-height: 1000px;
    }

    .selected-content.closed {
      display: none;
    }

    .copy-btn {
      background: #e06c00;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
    }

    .copy-btn:hover {
      background: #c45f00;
    }

    .selected-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
      padding-top: 10px;
    }

    .selected-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #fdfaf6;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #ebdccb;
      font-size: 14px;
    }

    .selected-item span {
      color: #4a3728;
    }

    .selected-item strong {
      color: #e06c00;
    }

    .empty-selected, .empty {
      color: #8a7360;
      font-style: italic;
      grid-column: 1 / -1;
      text-align: center;
      padding: 15px 0;
    }

    /* Foods Grid & Card */
    .foods-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .food-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #ebdccb;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 14px;
    }

    .food-top {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emoji {
      width: 54px;
      height: 54px;
      background: #fdfaf6;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #f2e6d9;
    }

    .emoji img {
      width: 38px;
      height: 38px;
      object-fit: contain;
    }

    .food-info {
      flex: 1;
    }

    .food-info h3 {
      font-size: 16px;
      font-weight: 600;
      color: #4a3728;
      line-height: 1.2;
    }

    .machine {
      font-size: 12px;
      color: #e06c00;
      font-weight: 600;
      background: #fff3e0;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
      margin-top: 4px;
    }

    .food-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #fcf8f2;
      padding-top: 10px;
    }

    .level {
      font-size: 13px;
      color: #8a7360;
    }

    .level span {
      color: #4a3728;
      font-weight: 700;
    }

    .counter {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff3e0;
      padding: 4px;
      border-radius: 10px;
    }

    .counter button {
      width: 30px;
      height: 30px;
      border: none;
      background: #ffffff;
      color: #e06c00;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }

    .counter button:hover {
      background: #e06c00;
      color: #ffffff;
    }

    .counter span {
      font-size: 14px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      color: #4a3728;
    }

    @media (max-width: 768px) {
      .header h1 { font-size: 30px; }
      .controls { flex-direction: column; }
      .filter-select { width: 100%; height: 45px; }
    }
  </style>
</head>

  </div>

      </div>

        <div class="empty-selected">Belum ada item dipilih</div>
      </div>
    </div>
  </div>

  <div class="foods-grid" id="foodsGrid"></div>

</div>

/* ====================================
   ELEMENTS, STATE & TIMERS
   ==================================== */
const foodsGrid = document.getElementById("foodsGrid");
const selectedList = document.getElementById("selectedList");
const searchInput = document.getElementById("searchInput");
const machineFilter = document.getElementById("machineFilter");
const sortFilter = document.getElementById("sortFilter");
const selectedCount = document.getElementById("selectedCount");

let selectedFoods = {};
let selectedOpen = true;
let searchTimeout = null;

/* =========================================================
   RENDER FOODS GRID (DocumentFragment)
   ========================================================= */
function renderFoods(data){
  foodsGrid.innerHTML = "";

  if(data.length === 0){
    foodsGrid.innerHTML = `<div class="empty">Tidak ada makanan ditemukan 😢</div>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  data.forEach(food => {
    const qty = selectedFoods[food.en] || 0;
    const safeId = food.en.replaceAll(' ', '_').replaceAll("'", "");

    const card = document.createElement("div");
    card.className = "food-card";
    card.innerHTML = `
      <div class="food-top">
        <div class="emoji">
          <img src="foods/${food.en.replaceAll(' ','_')}.png"
               onerror="this.src='https://cdn-icons-png.flaticon.com/512/1046/1046784.png'"
               alt="${food.en}">
        </div>
        <div class="food-info">
          <h3>${food.en}</h3>
          <div class="machine">${food.fn}</div>
        </div>
      </div>
      <div class="food-bottom">
        <div class="level">Level <span>${food.lvl}</span></div>
        <div class="counter">
          <button onclick="changeQty('${food.en.replaceAll("'", "\\'")}', -1)">-</button>
          <span id="qty-${safeId}">${qty}</span>
          <button onclick="changeQty('${food.en.replaceAll("'", "\\'")}', 10)">+</button>
        </div>
      </div>
    `;
    fragment.appendChild(card);
  });

  foodsGrid.appendChild(fragment);
}

/* =========================
   CHANGE QTY
========================= */
function changeQty(name, amount){
  if(!selectedFoods[name]){
    selectedFoods[name] = 0;
  }

  selectedFoods[name] += amount;
  let currentQty = selectedFoods[name];

  if(selectedFoods[name] <= 0){
    delete selectedFoods[name];
    currentQty = 0;
  }

  const safeId = name.replaceAll(' ', '_').replaceAll("'", "");
  const qtySpan = document.getElementById(`qty-${safeId}`);
  if(qtySpan) {
    qtySpan.textContent = currentQty;
  }

  renderSelected();
}

/* =========================
   RENDER SELECTED LIST
========================= */
function renderSelected(){
  selectedList.innerHTML = "";
  const entries = Object.entries(selectedFoods);
  let total = 0;

  if(entries.length === 0){
    selectedList.innerHTML = `<div class="empty-selected">Belum ada item dipilih</div>`;
    selectedCount.textContent = 0;
    return;
  }

  const fragment = document.createDocumentFragment();

  entries.forEach(([name, qty]) => {
    total += qty;
    const item = document.createElement("div");
    item.className = "selected-item";
    item.innerHTML = `
      <span>${name}</span>
      <strong>x${qty}</strong>
    `;
    fragment.appendChild(item);
  });

  selectedList.appendChild(fragment);
  selectedCount.textContent = total;
}

/* ===============================================
   FILTER & SORT
   =============================================== */
function filterFoods(){
  let filtered = [...foodsData];

  const search = searchInput.value.toLowerCase().trim();
  const machine = machineFilter.value;
  const sort = sortFilter.value;

  if(search !== "") {
    filtered = filtered.filter(food =>
      food.en.toLowerCase().includes(search) ||
      food.fn.toLowerCase().includes(search)
    );
  }

  if(machine !== "all" && machine !== ""){
    filtered = filtered.filter(food => food.fn === machine);
  }

  if(sort === "low"){
    filtered.sort((a, b) => a.lvl - b.lvl);
  } else if(sort === "high"){
    filtered.sort((a, b) => b.lvl - a.lvl);
  } else if(sort === "az"){
    filtered.sort((a, b) => a.en.localeCompare(b.en));
  }

  renderFoods(filtered);
}

/* =========================================================
   DEBOUNCE INPUT
   ========================================================= */
function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    filterFoods();
  }, 150);
}

/* =========================
   UTILS / COPY / RESET
========================= */
function copySelected(){
  const entries = Object.entries(selectedFoods);

  if(entries.length === 0){
    alert("Belum ada item dipilih");
    return;
  }

  let text = "📋 LIST HAY DAY\n\n";
  entries.forEach(([name, qty]) => {
    text += `${name} x${qty}\n`;
  });

  navigator.clipboard.writeText(text);
  alert("List berhasil disalin!");
}

function resetAll() {
  selectedFoods = {};
  searchInput.value = "";
  machineFilter.value = "all";
  sortFilter.value = "default";

  renderSelected();
  filterFoods(); 
}

function populateMachines(){
  const machines = [...new Set(foodsData.map(item => item.fn))];
  machines.sort();

  // Reset isi dropdown filter dan sisakan default "Semua Mesin"
  machineFilter.innerHTML = `<option value="all">Semua Mesin</option>`;

  const fragment = document.createDocumentFragment();
  machines.forEach(machine => {
    const opt = document.createElement("option");
    opt.value = machine;
    opt.textContent = machine;
    fragment.appendChild(opt);
  });
  machineFilter.appendChild(fragment);
}

function updateStats(){
  document.getElementById("totalFoods").textContent = foodsData.length;
  document.getElementById("totalMachines").textContent = [...new Set(foodsData.map(item=>item.fn))].length;
  document.getElementById("highestLevel").textContent = Math.max(...foodsData.map(item=>item.lvl));
}

function toggleSelectedBox(){
  const content = document.getElementById("selectedContent");
  const icon = document.getElementById("toggleIcon");

  selectedOpen = !selectedOpen;

  if(selectedOpen){
    content.classList.remove("closed");
    icon.innerHTML = "▼";
  } else {
    content.classList.add("closed");
    icon.innerHTML = "▶";
  }
}

/* =========================
   LISTENERS & INIT
========================= */
searchInput.addEventListener("input", debounceSearch);
machineFilter.addEventListener("change", filterFoods);
sortFilter.addEventListener("change", filterFoods);

populateMachines();
updateStats();
renderFoods(foodsData);
renderSelected();
</script>
